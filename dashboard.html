<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salman Enterprises | Dashboard Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --radius: 12px;
      --background: #f8fafc;
      --card: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #10ac84;

      --bg-pending: #fef9c3;
      --color-pending: #854d0e;
      --bg-processing: #e0f2fe;
      --color-processing: #0369a1;
      --bg-shipped: #dcfce7;
      --color-shipped: #15803d;
      --bg-delivered: #d1fae5;
      --color-delivered: #065f46;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: var(--background); color: var(--text-main); padding: 2rem; }
    .container { max-width: 1400px; margin: 0 auto; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; background: var(--card); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
    .metrics-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .metric-card { background: var(--card); padding: 1.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
    .metric-card span { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    .metric-card h2 { font-size: 2.2rem; font-weight: 700; margin-top: 0.5rem; }
    table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); }
    th, td { padding: 1.2rem 1.5rem; border-bottom: 1px solid #f1f5f9; text-align: left; }
    .status-select { padding: 0.45rem 1rem; border-radius: 20px; border: none; cursor: pointer; width: 140px; }
    .status-Pending { background: var(--bg-pending); color: var(--color-pending); }
    .status-Processing { background: var(--bg-processing); color: var(--color-processing); }
    .status-Shipped { background: var(--bg-shipped); color: var(--color-shipped); }
    .status-Delivered { background: var(--bg-delivered); color: var(--color-delivered); }
  </style>
</head>

<body>
  <div class="container">
    <div class="dashboard-header">
      <h1>Live Operations Control Desk</h1>
      <button class="btn" onclick="loadDashboardOrders()">Refresh</button>
    </div>

    <div class="metrics-bar">
      <div class="metric-card" style="border-left: 4px solid var(--color-pending)"><span>Pending</span><h2 id="count-pending">0</h2></div>
      <div class="metric-card" style="border-left: 4px solid var(--color-processing)"><span>Processing</span><h2 id="count-processing">0</h2></div>
      <div class="metric-card" style="border-left: 4px solid var(--color-shipped)"><span>Shipped</span><h2 id="count-shipped">0</h2></div>
      <div class="metric-card" style="border-left: 4px solid var(--color-delivered)"><span>Delivered</span><h2 id="count-delivered">0</h2></div>
      <div class="metric-card" style="border-left: 4px solid #475569"><span>Total</span><h2 id="count-total">0</h2></div>
    </div>

    <table>
      <thead><tr><th>Order ID</th><th>Status Option</th></tr></thead>
      <tbody id="dashboard-table-rows"></tbody>
    </table>
  </div>

  <script>
    const GOOGLE_SHEET_API = "https://script.google.com/macros/s/AKfycbwI4trLvUQos7KZpchKLE-5OpZwpODTydeetFhwbZtSflscm09XB2XZb5co7SR_Eyx0/exec";

    function updateCounters(orders) {
      let p = 0, pr = 0, s = 0, d = 0;
      orders.forEach(o => {
        let status = (o.status || 'Pending').toLowerCase().trim();
        if (status === 'pending') p++;
        else if (status === 'processing') pr++;
        else if (status === 'shipped') s++;
        else if (status === 'delivered') d++;
      });
      document.getElementById('count-pending').innerText = p;
      document.getElementById('count-processing').innerText = pr;
      document.getElementById('count-shipped').innerText = s;
      document.getElementById('count-delivered').innerText = d;
      document.getElementById('count-total').innerText = orders.length;
    }

    function renderOrders(orders) {
      const rowContainer = document.getElementById("dashboard-table-rows");
      updateCounters(orders);
      rowContainer.innerHTML = orders.map(order => `
        <tr>
          <td>${order.id}</td>
          <td>
            <select class="status-select status-${order.status}" onchange="changeStatusOnExcel('${order.id}', this.value, this)">
              <option value="Pending" ${order.status==='Pending'?'selected':''}>Pending</option>
              <option value="Processing" ${order.status==='Processing'?'selected':''}>Processing</option>
              <option value="Shipped" ${order.status==='Shipped'?'selected':''}>Shipped</option>
              <option value="Delivered" ${order.status==='Delivered'?'selected':''}>Delivered</option>
            </select>
          </td>
        </tr>`).join('');
    }

    function loadDashboardOrders() {
      fetch(GOOGLE_SHEET_API + "?_=" + Date.now()).then(r => r.json()).then(data => renderOrders(data));
    }

    function changeStatusOnExcel(orderId, newStatus, selectTag) {
      fetch(`${GOOGLE_SHEET_API}?action=updateStatus&id=${orderId}&status=${newStatus}`)
        .then(() => loadDashboardOrders());
    }

    window.onload = loadDashboardOrders;
  </script>
</body>
</html>
